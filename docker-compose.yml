services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: signflip_server
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8080),2); s.close()" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      NUM_CLIENTS: "7"
      NUM_ROUNDS: "40"
      LR: "1e-4"
      LOCAL_EPOCHS: "5"
      CLIPNORM: "0.0"
      LAMBDA_SAM: "0.05"
      SEED: "42"
      MALICIOUS_CIDS: "0,1,2,4,5"
      SIGN_FLIP_ALPHA: "1.0"
      ANOMALY_PCT: "95.0"
      SCORE_DIR: "/app/outputs/client_scores_conv3DAE_FedAvg_attack_aug_v3_m5"
      LOG_DIR: "/app/logs"
      CHECKPOINT_DIR: /app/checkpoints
      SERVER_PORT: "8080"
    volumes:
      - type: bind
        source: ./outputs
        target: /app/outputs
      - type: bind
        source: ./logs
        target: /app/logs
      - type: bind
        source: ./checkpoints
        target: /app/checkpoints
    networks:
      - federated_network
    restart: "no"

  client-0:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: signflip_client_0
    depends_on:
      server:
        condition: service_healthy
    environment:
      DATA_FILE: "/data/AEZ_6.npy"
      CLIENT_ID: "0"
      SERVER_ADDRESS: "server:8080"
      BATCH_SIZE: "4"
      VAL_RATIO: "0.15"
      SEED: "42"
      MAX_RETRIES: "15"
      RETRY_DELAY: "5"
      LOG_DIR: "/app/logs"
    volumes:
      - type: bind
        source: ../HSI-FedAvg-v2/data/AEZ_6.npy
        target: /data/AEZ_6.npy
        read_only: true
      - type: bind
        source: ./outputs
        target: /app/outputs
      - type: bind
        source: ./logs
        target: /app/logs
    networks:
      - federated_network
    restart: on-failure

  client-1:
